<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="特別費">
<meta name="theme-color" content="#f7f2ea">
<title>特別費記録</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Yomogi&display=swap" rel="stylesheet">
<style>
@font-face{font-family:"Azuki";src:url("../azukiP.ttf") format("truetype");font-display:swap;}

  :root{
    --cream:#f7f2ea;--paper:#fffdf8;--ink:#5a5048;--ink-soft:#938678;
    --rose:#d8a7a0;--rose-deep:#c98b84;--sage:#a8b89a;--sage-deep:#8fa37f;
    --mustard:#e0bd7a;--mustard-deep:#cda254;--sky:#94b8c4;--sky-deep:#6f9aa8;
    --line:#e8dfd2;--shadow:rgba(120,100,80,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:"Azuki","Zen Maru Gothic",sans-serif;
    background:radial-gradient(circle at 12% 8%,rgba(224,189,122,.12),transparent 42%),
      radial-gradient(circle at 88% 92%,rgba(168,184,154,.12),transparent 42%),var(--cream);
    color:var(--ink);min-height:100dvh;padding:16px 14px 40px;display:flex;justify-content:center;}
  .app{width:100%;max-width:440px;}
  .head{text-align:center;margin:4px 0 12px;}
  .head .deco{font-family:"Yomogi",cursive;font-size:13px;color:var(--mustard-deep);letter-spacing:.1em;}
  .head h1{font-weight:700;font-size:22px;letter-spacing:.04em;margin-top:4px;color:var(--mustard-deep);}
  .date{font-size:12px;color:var(--ink-soft);margin-top:4px;}

  .tabs{display:flex;gap:6px;background:var(--line);padding:5px;border-radius:18px;margin-bottom:16px;}
  .tab{flex:1;text-align:center;font-family:inherit;font-weight:700;font-size:14px;color:var(--ink-soft);
    background:transparent;border:none;padding:11px 0;border-radius:14px;cursor:pointer;transition:.2s;}
  .tab.active{background:var(--paper);color:var(--ink);box-shadow:0 2px 8px var(--shadow);}
  .page{display:none;animation:fade .3s ease;}
  .page.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:18px 16px;
    box-shadow:0 8px 22px var(--shadow);margin-bottom:14px;}
  .f-label{font-size:12px;font-weight:700;color:var(--ink-soft);margin:12px 2px 6px;}
  .f-label:first-child{margin-top:0;}
  input[type=date],input[type=text],input[type=number]{width:100%;font-family:inherit;font-size:15px;color:var(--ink);
    background:var(--cream);border:1.5px solid var(--line);border-radius:13px;padding:12px 13px;outline:none;-webkit-appearance:none;}
  input:focus{border-color:var(--mustard);}
  .chips{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{font-family:inherit;font-size:13px;font-weight:700;color:var(--ink-soft);background:var(--cream);
    border:1.5px solid var(--line);border-radius:99px;padding:9px 13px;cursor:pointer;transition:.15s;}
  .chip.sel{background:var(--sage-deep);border-color:var(--sage-deep);color:#fff;}
  .chip:active{transform:scale(.95);}
  .yen-row{position:relative;}
  .yen-row::after{content:"円";position:absolute;right:14px;top:50%;transform:translateY(-50%);
    font-size:14px;font-weight:700;color:var(--ink-soft);}
  .yen-row input{padding-right:42px;font-variant-numeric:tabular-nums;}
  .save-btn{display:block;width:100%;margin-top:16px;font-family:inherit;font-weight:700;font-size:16px;color:#fff;
    background:var(--mustard-deep);border:none;border-radius:16px;padding:15px;cursor:pointer;}
  .save-btn:active{transform:scale(.98);}

  .m-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .m-nav button{width:38px;height:38px;border-radius:12px;border:1.5px solid var(--line);background:var(--paper);
    font-size:17px;color:var(--ink-soft);cursor:pointer;}
  .m-nav button:active{background:var(--line);}
  .m-title{font-weight:700;font-size:17px;color:var(--mustard-deep);}
  .m-sum{text-align:center;font-size:13px;color:var(--ink-soft);margin-bottom:12px;}
  .m-sum b{font-size:20px;color:var(--sage-deep);font-variant-numeric:tabular-nums;}

  .rec{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);
    border-radius:16px;padding:12px 13px;box-shadow:0 3px 10px var(--shadow);margin-bottom:8px;}
  .rec .r-mid{flex:1;min-width:0;}
  .rec .r-name{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rec .r-meta{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .rec .r-cat{display:inline-block;font-size:10.5px;font-weight:700;color:var(--sage-deep);background:#eef2e9;
    border-radius:99px;padding:2px 8px;}
  .rec .r-amt{flex:0 0 auto;font-weight:700;font-size:15px;color:var(--ink);font-variant-numeric:tabular-nums;}
  .rec .del{flex:0 0 auto;width:26px;height:26px;border:none;background:transparent;color:var(--ink-soft);
    font-size:18px;cursor:pointer;border-radius:50%;opacity:.45;}
  .rec .del:active{opacity:1;background:var(--line);}
  .empty{text-align:center;color:var(--ink-soft);font-size:14px;padding:24px 0;font-family:"Yomogi",cursive;}

  .y-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px;}
  .y-nav button{width:34px;height:34px;border-radius:11px;border:1.5px solid var(--line);background:var(--paper);
    font-size:15px;color:var(--ink-soft);cursor:pointer;}
  .y-nav button:active{background:var(--line);}
  .y-nav .y-title{font-weight:700;font-size:16px;color:var(--mustard-deep);}

  .year-card{background:linear-gradient(160deg,#fbf3e0,#fff);border:1px solid var(--line);border-radius:24px;
    padding:22px 18px;text-align:center;box-shadow:0 8px 22px var(--shadow);margin-bottom:14px;}
  .yc-label{font-size:12px;color:var(--ink-soft);letter-spacing:.1em;}
  .yc-amt{font-weight:700;font-size:38px;color:var(--mustard-deep);line-height:1.2;font-variant-numeric:tabular-nums;}
  .yc-amt small{font-size:18px;}
  .yc-sub{font-family:"Yomogi",cursive;font-size:13px;color:var(--rose-deep);margin-top:6px;min-height:20px;}
  .bar{height:18px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:14px;}
  .bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--sage),var(--mustard));border-radius:99px;transition:width .55s cubic-bezier(.34,1.56,.64,1);}
  .bar-fill.over{background:linear-gradient(90deg,var(--mustard),var(--rose-deep));}
  .bar-cap{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink-soft);margin-top:5px;}
  .budget-row{display:flex;align-items:center;gap:8px;margin-top:14px;}
  .budget-row .f-label{margin:0;white-space:nowrap;}
  .budget-row .yen-row{flex:1;}
  .budget-row input{padding:10px 42px 10px 12px;font-size:14px;}

  .mo-chart{display:flex;align-items:flex-end;gap:4px;height:110px;padding:0 2px;margin-top:6px;}
  .mc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;}
  .mc .mc-bar{width:100%;background:linear-gradient(180deg,var(--mustard),var(--sage));border-radius:6px 6px 3px 3px;min-height:3px;transition:height .5s cubic-bezier(.34,1.56,.64,1);}
  .mc .mc-l{font-size:9px;color:var(--ink-soft);}
  .sec-title{font-size:12px;font-weight:700;color:var(--ink-soft);margin:16px 4px 8px;}

  .cat-sum{display:flex;flex-direction:column;gap:8px;}
  .cs{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);
    border-radius:16px;padding:12px 14px;box-shadow:0 3px 10px var(--shadow);}
  .cs .c-name{flex:1;font-size:14px;font-weight:700;}
  .cs .c-amt{font-weight:700;font-size:15px;color:var(--mustard-deep);font-variant-numeric:tabular-nums;}
  .cs .c-cnt{font-size:11px;color:var(--ink-soft);}
  .tip{font-size:11.5px;color:var(--ink-soft);text-align:center;margin-top:14px;line-height:1.7;}

  .toast{position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(80px);background:var(--ink);
    color:#fff;font-size:14px;font-weight:500;padding:12px 22px;border-radius:99px;box-shadow:0 6px 20px var(--shadow);
    z-index:60;opacity:0;transition:.35s cubic-bezier(.34,1.56,.64,1);max-width:90vw;text-align:center;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

  .bkx{margin:18px 14px 100px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:18px;
    padding:14px 16px;box-shadow:0 4px 12px rgba(0,0,0,.06);font-size:12px;color:#8a8073;line-height:1.7}
  .bkx h3{font-size:13.5px;color:#5b4636;margin-bottom:4px;display:flex;align-items:center;gap:6px}
  .bkx h3 svg{width:18px;height:18px}
  .bkx .bkx-btn{border:none;border-radius:12px;padding:9px 16px;font-family:inherit;font-weight:700;
    font-size:12.5px;color:#fff;background:#a8b89a;margin:8px 8px 0 0;cursor:pointer}
  .bkx .bkx-btn.sub{background:#c9bfae}
</style>

<div class="app">
  <div class="head">
    <div class="deco">＼ いつ・何に使ったか ひとめで ／</div>
    <h1>特別費記録</h1>
    <div class="date" id="date"></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="input">記録</button>
    <button class="tab" data-tab="list">一覧</button>
    <button class="tab" data-tab="summary">集計</button>
  </div>

  <!-- ============ input ============ -->
  <div class="page active" id="page-input">
    <div class="card">
      <div class="f-label"><svg viewBox="0 0 48 48" width="15" height="15" fill="none" stroke="#6b584a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><rect x="8" y="11" width="32" height="29" rx="4" fill="#f7ead8"/><path d="M8 19 H40" stroke-width="2.5"/><path d="M16 7 V14 M32 7 V14"/><circle cx="17" cy="26" r="1.6" fill="#6b584a" stroke="none"/><circle cx="24" cy="26" r="1.6" fill="#6b584a" stroke="none"/><circle cx="31" cy="26" r="1.6" fill="#6b584a" stroke="none"/><circle cx="17" cy="33" r="1.6" fill="#6b584a" stroke="none"/><circle cx="24" cy="33" r="1.6" fill="#6b584a" stroke="none"/></svg> 日付</div>
      <input type="date" id="fDate">
      <div class="f-label"><svg viewBox="0 0 48 48" width="15" height="15" fill="none" stroke="#6b584a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><rect x="8" y="8" width="25" height="31" rx="2.5" fill="#fdfaf2"/><path d="M13 16 H28 M13 22 H28 M13 28 H21" stroke-width="2.2"/><g transform="rotate(40 35 28)"><rect x="32" y="13" width="6.5" height="21" rx="1.5" fill="#f0c26e"/><path d="M32 34 L35.2 40 L38.5 34 Z" fill="#f2d4a8"/></g></svg> 何に使った？</div>
      <input type="text" id="fName" placeholder="例：車検、入学準備、お年玉" maxlength="20" list="nameList">
      <datalist id="nameList"></datalist>
      <div class="f-label"><svg viewBox="0 0 48 48" width="15" height="15" fill="none" stroke="#6b584a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M10 10 H24 L40 26 Q42 28 40 30 L30 40 Q28 42 26 40 L10 24 Z" fill="#f6cd8e"/><circle cx="17.5" cy="17.5" r="3" fill="#fff"/></svg> カテゴリ</div>
      <div class="chips" id="catChips"></div>
      <div class="f-label"><svg viewBox="0 0 48 48" width="15" height="15" fill="none" stroke="#6b584a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M19.5 12 Q17 8.5 20 7.5 L28 7.5 Q31 8.5 28.5 12" fill="#e8c987"/><path d="M18 13 H30 Q39 20 39 29.5 Q39 40 24 40 Q9 40 9 29.5 Q9 20 18 13 Z" fill="#f0d49c"/><path d="M20 21.5 L24 27 L28 21.5 M24 27 V34.5 M20.5 29.5 H27.5 M20.5 32.5 H27.5" stroke-width="2.6"/></svg> 金額</div>
      <div class="yen-row"><input type="number" id="fAmt" placeholder="0" min="0" inputmode="numeric"></div>
      <button class="save-btn" id="saveBtn">記録する</button>
    </div>
    <div class="tip">毎月の食費や日用品ではない「たまの大きい出費」を記録するアプリだよ。<br>車検・税金・行事・プレゼント・帰省など、なんでもOK</div>
  </div>

  <!-- ============ list ============ -->
  <div class="page" id="page-list">
    <div class="m-nav">
      <button id="mPrev">‹</button>
      <div class="m-title" id="mTitle"></div>
      <button id="mNext">›</button>
    </div>
    <div class="m-sum">この月の特別費 <b id="mSum">0</b> 円（<span id="mCnt">0</span>件）</div>
    <div id="recList"></div>
  </div>

  <!-- ============ summary ============ -->
  <div class="page" id="page-summary">
    <div class="y-nav">
      <button id="yPrev">‹</button>
      <div class="y-title" id="yTitle"></div>
      <button id="yNext">›</button>
    </div>
    <div class="year-card">
      <div class="yc-label">今年使った特別費</div>
      <div class="yc-amt"><span id="yAmt">0</span><small> 円</small></div>
      <div class="yc-sub" id="ySub"></div>
      <div class="bar" id="budgetBar" style="display:none;"><div class="bar-fill" id="budgetFill"></div></div>
      <div class="bar-cap" id="budgetCap" style="display:none;"><span>0円</span><span id="budgetCapR"></span></div>
      <div class="budget-row">
        <div class="f-label"><svg viewBox="0 0 48 48" width="15" height="15" fill="none" stroke="#6b584a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><circle cx="22" cy="27" r="14" fill="#fdfaf2"/><circle cx="22" cy="27" r="8.5" fill="#f4a8a2"/><circle cx="22" cy="27" r="3.5" fill="#fff"/><path d="M22 27 L37 12 M37 12 V18.5 M37 12 H30.5" stroke-width="2.6"/></svg> 年間予算（任意）</div>
        <div class="yen-row"><input type="number" id="fBudget" placeholder="未設定" min="0" inputmode="numeric"></div>
      </div>
    </div>
    <div class="sec-title"><svg viewBox="0 0 48 48" width="15" height="15" fill="none" stroke="#6b584a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M8 40 H40" stroke-width="2.5"/><rect x="11" y="25" width="7" height="15" fill="#94b8c4"/><rect x="20.5" y="17" width="7" height="23" fill="#f4a09c"/><rect x="30" y="29" width="7" height="11" fill="#a8b89a"/></svg> 月ごとの特別費</div>
    <div class="card" style="padding:14px 12px;">
      <div class="mo-chart" id="moChart"></div>
    </div>
    <div class="sec-title"><svg viewBox="0 0 48 48" width="15" height="15" fill="none" stroke="#6b584a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M10 10 H24 L40 26 Q42 28 40 30 L30 40 Q28 42 26 40 L10 24 Z" fill="#f6cd8e"/><circle cx="17.5" cy="17.5" r="3" fill="#fff"/></svg> カテゴリ別</div>
    <div class="cat-sum" id="catSum"></div>
    <div class="tip">予算を入れると「あとどれくらい使えるか」が見えるよ。<br>入れなくても記録と集計はぜんぶ使えます</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY="tokubetsuhi_app_v2";
const CATS=["行事・イベント","車・住まい","保険・税金","こども","帰省・旅行","プレゼント","その他"];

let state={records:[],budgets:{}};   /* record: {id,date:"YYYY-MM-DD",name,cat,amt} / budgets: {"2026":600000} */
let selCat=0;
let mRef=new Date(), yRef=new Date().getFullYear();

async function storeGet(k){
  try{if(typeof window!=="undefined"&&window.storage&&window.storage.get){const r=await window.storage.get(k);return r?r.value:null;}}catch(e){}
  try{return localStorage.getItem(k);}catch(e){return null;}
}
async function storeSet(k,v){
  try{if(typeof window!=="undefined"&&window.storage&&window.storage.set){await window.storage.set(k,v);return;}}catch(e){}
  try{localStorage.setItem(k,v);}catch(e){}
}
async function load(){
  try{const v=await storeGet(KEY);if(v)state=Object.assign(state,JSON.parse(v));}catch(e){}
  if(!Array.isArray(state.records))state.records=[];
  if(!state.budgets||typeof state.budgets!=="object")state.budgets={};
  /* v1（予定型）からの引き継ぎ：支払い済みの予定を記録として取り込む */
  try{
    const old=await storeGet("tokubetsuhi_app_v1");
    if(old&&!state.migrated){
      const o=JSON.parse(old);
      (o.items||[]).forEach(it=>{
        if(it.paid){
          const amt=(typeof it.actual==="number")?it.actual:it.amt;
          const date=it.year+"-"+String(it.month).padStart(2,"0")+"-15";
          state.records.push({id:it.id,date:date,name:it.name,cat:Math.min(it.cat,CATS.length-1),amt:amt});
        }
      });
      state.migrated=true;await save();
    }
  }catch(e){}
  renderAll();
}
async function save(){try{await storeSet(KEY,JSON.stringify(state));}catch(e){}}

function esc(s){return(""+s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function yen(n){return n.toLocaleString("ja-JP");}
let toastT;function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2300);}

function renderAll(){renderCatChips();renderNameList();renderList();renderSummary();}

/* ---- tabs ---- */
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x===t));
  document.querySelectorAll(".page").forEach(x=>x.classList.toggle("active",x.id==="page-"+t.dataset.tab));
  if(t.dataset.tab==="list")renderList();
  if(t.dataset.tab==="summary")renderSummary();
}));

/* ---- input ---- */
function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
document.getElementById("fDate").value=todayStr();

function renderCatChips(){
  const w=document.getElementById("catChips");w.innerHTML="";
  CATS.forEach((n,i)=>{
    const b=document.createElement("button");b.className="chip"+(i===selCat?" sel":"");b.textContent=n;
    b.addEventListener("click",()=>{selCat=i;renderCatChips();});
    w.appendChild(b);
  });
}
function renderNameList(){
  const dl=document.getElementById("nameList");dl.innerHTML="";
  const seen={};
  state.records.slice().reverse().forEach(r=>{
    if(r.name&&!seen[r.name]){seen[r.name]=1;
      const o=document.createElement("option");o.value=r.name;dl.appendChild(o);}
  });
}
document.getElementById("saveBtn").addEventListener("click",async()=>{
  const date=document.getElementById("fDate").value;
  const name=document.getElementById("fName").value.trim();
  const amt=parseInt(document.getElementById("fAmt").value,10);
  if(!date){toast("日付を選んでね");return;}
  if(!name){toast("何に使ったか入力してね");return;}
  if(!amt||amt<1){toast("金額を入力してね");return;}
  state.records.push({id:Date.now(),date:date,name:name,cat:selCat,amt:amt});
  await save();
  document.getElementById("fName").value="";document.getElementById("fAmt").value="";
  renderNameList();
  toast("記録したよ ✓ "+name+"・"+yen(amt)+"円");
});

/* ---- monthly list ---- */
function renderList(){
  const mk=mRef.getFullYear()+"-"+String(mRef.getMonth()+1).padStart(2,"0");
  document.getElementById("mTitle").textContent=mRef.getFullYear()+"年 "+(mRef.getMonth()+1)+"月";
  const recs=state.records.filter(r=>r.date&&r.date.slice(0,7)===mk).sort((a,b)=>a.date<b.date?1:-1);
  const list=document.getElementById("recList");list.innerHTML="";
  let sum=0;
  if(recs.length===0)list.innerHTML='<div class="empty">この月の特別費はないよ。えらい！◎</div>';
  recs.forEach(r=>{
    sum+=r.amt;
    const el=document.createElement("div");el.className="rec";
    const d=r.date.slice(8,10).replace(/^0/,"")+"日";
    el.innerHTML='<div class="r-mid"><div class="r-name">'+esc(r.name)+'</div>'
      +'<div class="r-meta">'+d+'　<span class="r-cat">'+(CATS[r.cat]||"")+'</span></div></div>'
      +'<span class="r-amt">'+yen(r.amt)+'円</span>'
      +'<button class="del" data-id="'+r.id+'">×</button>';
    list.appendChild(el);
  });
  document.getElementById("mSum").textContent=yen(sum);
  document.getElementById("mCnt").textContent=recs.length;
  list.querySelectorAll(".del").forEach(b=>b.addEventListener("click",async()=>{
    state.records=state.records.filter(r=>r.id!=b.dataset.id);
    await save();renderList();renderSummary();renderNameList();
  }));
}
document.getElementById("mPrev").addEventListener("click",()=>{mRef=new Date(mRef.getFullYear(),mRef.getMonth()-1,1);renderList();});
document.getElementById("mNext").addEventListener("click",()=>{mRef=new Date(mRef.getFullYear(),mRef.getMonth()+1,1);renderList();});

/* ---- yearly summary ---- */
function renderSummary(){
  document.getElementById("yTitle").textContent=yRef+"年";
  const recs=state.records.filter(r=>r.date&&r.date.slice(0,4)==(""+yRef));
  const total=recs.reduce((s,r)=>s+r.amt,0);
  document.getElementById("yAmt").textContent=yen(total);

  /* budget (optional) */
  const fb=document.getElementById("fBudget");
  const budget=state.budgets[yRef]||0;
  fb.value=budget||"";
  const bar=document.getElementById("budgetBar"),cap=document.getElementById("budgetCap"),fill=document.getElementById("budgetFill");
  const sub=document.getElementById("ySub");
  if(budget>0){
    bar.style.display="";cap.style.display="";
    const pct=Math.min(100,Math.round(total/budget*100));
    fill.style.width=pct+"%";
    fill.classList.toggle("over",total>budget);
    document.getElementById("budgetCapR").textContent="予算 "+yen(budget)+"円";
    if(total>budget)sub.textContent="予算より "+yen(total-budget)+"円 オーバーしてるよ";
    else sub.textContent="予算まで あと "+yen(budget-total)+"円";
  }else{
    bar.style.display="none";cap.style.display="none";
    sub.textContent=recs.length===0?"記録するとここに集計が出るよ":"今年は "+recs.length+"件の特別費があったよ";
  }

  /* monthly mini chart */
  const mo=Array(12).fill(0);
  recs.forEach(r=>{mo[parseInt(r.date.slice(5,7),10)-1]+=r.amt;});
  const mx=Math.max(1,...mo);
  const chart=document.getElementById("moChart");chart.innerHTML="";
  mo.forEach((v,i)=>{
    const c=document.createElement("div");c.className="mc";
    const h=v?Math.max(6,Math.round(v/mx*84)):3;
    c.innerHTML='<div class="mc-bar" style="height:'+h+'px;opacity:'+(v?1:.35)+'" title="'+yen(v)+'円"></div><div class="mc-l">'+(i+1)+'</div>';
    chart.appendChild(c);
  });

  /* category totals */
  const cs=document.getElementById("catSum");cs.innerHTML="";
  CATS.forEach((n,i)=>{
    const ci=recs.filter(x=>x.cat===i);if(ci.length===0)return;
    const t=ci.reduce((s,x)=>s+x.amt,0);
    const el=document.createElement("div");el.className="cs";
    el.innerHTML='<span class="c-name">'+n+'</span><span class="c-cnt">'+ci.length+'件</span><span class="c-amt">'+yen(t)+'円</span>';
    cs.appendChild(el);
  });
  if(cs.innerHTML==="")cs.innerHTML='<div class="empty">まだ記録がないよ ✎</div>';
}
document.getElementById("fBudget").addEventListener("change",async function(){
  const v=parseInt(this.value,10);
  if(v&&v>0)state.budgets[yRef]=v;else delete state.budgets[yRef];
  await save();renderSummary();
});
document.getElementById("yPrev").addEventListener("click",()=>{yRef--;renderSummary();});
document.getElementById("yNext").addEventListener("click",()=>{yRef++;renderSummary();});

const now=new Date();const wd=["日","月","火","水","木","金","土"][now.getDay()];
document.getElementById("date").textContent=(now.getMonth()+1)+"月"+now.getDate()+"日（"+wd+"）";
load();
</script>

<div class="bkx">
  <h3><svg viewBox="0 0 48 48" fill="none" stroke="#6b584a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M24 7 V25 M17 19 L24 26 L31 19"/><path d="M8 29 V35 Q8 40 13 40 H35 Q40 40 40 35 V29"/></svg> データのバックアップ</h3>
  記録はこの端末のブラウザ内に保存されています。ときどきファイルに書き出しておくと、機種変更やアプリのお引っ越しでも安心です。<br>
  <button class="bkx-btn" id="bkxExp">書き出す</button><button class="bkx-btn sub" id="bkxImpBtn">読み込む</button>
  <input type="file" id="bkxImp" accept=".json" style="display:none">
</div>
<script>
(function(){
  var APP="tokubetsuhi";
  document.getElementById("bkxExp").addEventListener("click",function(){
    var data={};
    for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);data[k]=localStorage.getItem(k);}
    var blob=new Blob([JSON.stringify({__bkx:APP,data:data},null,2)],{type:"application/json"});
    var a=document.createElement("a");a.href=URL.createObjectURL(blob);
    var d=new Date();
    a.download=APP+"-backup-"+d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+".json";
    a.click();URL.revokeObjectURL(a.href);
  });
  document.getElementById("bkxImpBtn").addEventListener("click",function(){document.getElementById("bkxImp").click();});
  document.getElementById("bkxImp").addEventListener("change",function(ev){
    var f=ev.target.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(){
      try{
        var j=JSON.parse(r.result);
        var data=j.__bkx?j.data:j;
        if(typeof data!=="object"||!data)throw 0;
        if(!confirm("今の記録を読み込んだ内容で置き換えます。よろしいですか？"))return;
        Object.keys(data).forEach(function(k){localStorage.setItem(k,data[k]);});
        alert("読み込みました。画面を更新します。");location.reload();
      }catch(e){alert("このファイルは読み込めませんでした");}
    };
    r.readAsText(f);ev.target.value="";
  });
})();
</script>
