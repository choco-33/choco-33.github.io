<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>お小遣い帳</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#f7f2ea">
<style>
@font-face{font-family:"Uzura";src:url("../uzura.ttf") format("truetype");font-display:swap;}
  :root{
    --bg:#f7f2ea; --card:#fffdf9; --text:#4a3f35; --sub:#a09484; --line:#e3d7c8;
    --accent:#94b8c4; --accent-dark:#6f97a5;
    --cho:#e8b04b; --kifu:#e09a94; --sugu:#8fbf9f;
    --shadow:0 2px 10px rgba(160,130,90,.13);
  }
  body.ao{ --accent:#e0bd7a; --accent-dark:#c4a020; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    font-family:"Uzura","Zen Maru Gothic",sans-serif;
    background:var(--bg); color:var(--text);
    max-width:480px; margin:0 auto; min-height:100vh; padding-bottom:84px;
  }
  header{text-align:center; padding:16px 16px 6px}
  header h1{font-size:20px; letter-spacing:2px; display:flex; align-items:center; justify-content:center; gap:8px}
  header h1 svg{width:27px; height:27px}
  .set-line{font-size:12px; color:var(--sub); margin-top:3px}
  .set-line button{border:none; background:none; color:var(--accent-dark); font-family:inherit; font-size:12px; text-decoration:underline}

  .kids{display:flex; gap:8px; padding:10px 16px 4px}
  .kid{
    flex:1; border:2px solid var(--line); background:var(--card); border-radius:16px;
    padding:9px 0; font-family:inherit; font-size:15px; font-weight:bold; color:var(--sub);
    display:flex; align-items:center; justify-content:center; gap:7px;
  }
  .kid svg{width:26px; height:14px}
  .kid.on{color:var(--text); box-shadow:0 2px 8px rgba(160,130,90,.15)}
  .kid.saku.on{border-color:#94b8c4; background:#eef4f6}
  .kid.ao.on{border-color:#e0bd7a; background:#fdf7ea}

  .page{display:none; padding:0 14px}
  .page.active{display:block}

  /* お小遣いの日カード */
  .payday{
    margin:10px 2px 12px; border-radius:20px; box-shadow:var(--shadow);
    background:var(--card); border:2px dashed var(--line);
    padding:14px 16px; text-align:center;
  }
  .payday.due{border:2.5px solid var(--accent); background:linear-gradient(160deg,#fffdf5,#fff)}
  .payday .p-title{font-size:13px; color:var(--sub)}
  .payday.due .p-title{color:var(--accent-dark); font-weight:bold; font-size:14px}
  .payday .p-amt{font-size:30px; font-weight:bold; color:var(--accent-dark); margin:2px 0}
  .payday .p-amt small{font-size:14px}
  .payday .p-sub{font-size:11px; color:var(--sub); line-height:1.7}
  .payday button{
    border:none; background:var(--accent); color:#fff; font-family:inherit; font-weight:bold;
    font-size:14px; padding:10px 26px; border-radius:14px; margin-top:8px;
    box-shadow:0 3px 0 var(--accent-dark);
  }
  .payday button:active{transform:translateY(2px); box-shadow:0 1px 0 var(--accent-dark)}

  .total-line{text-align:center; font-size:12.5px; color:var(--sub); margin-bottom:10px}
  .total-line b{font-size:16px; color:var(--text)}

  /* 3つのお財布 */
  .jars{display:flex; gap:9px; margin-bottom:14px}
  .jar{
    flex:1; background:var(--card); border-radius:18px; box-shadow:var(--shadow);
    padding:12px 6px 10px; text-align:center; border:none; font-family:inherit; color:var(--text);
  }
  .jar svg{width:38px; height:38px}
  .jar .j-name{font-size:12px; color:var(--sub); margin-top:3px}
  .jar .j-amt{font-size:16.5px; font-weight:bold; margin-top:1px}
  .jar.cho .j-amt{color:#c28c28}
  .jar.kifu .j-amt{color:#c47a72}
  .jar.sugu .j-amt{color:#5f9a72}
  .jar-hint{font-size:11px; color:var(--sub); text-align:center; margin-bottom:16px; line-height:1.7}

  .hist-day{font-size:12px; color:var(--sub); margin:12px 4px 6px; font-weight:bold}
  .rec{
    background:var(--card); border-radius:14px; box-shadow:var(--shadow);
    padding:10px 14px; margin-bottom:7px; display:flex; align-items:center; gap:10px;
  }
  .rec .ricon{width:24px; height:24px; flex-shrink:0}
  .rec .ricon svg{width:100%; height:100%}
  .rec .rmain{flex:1; min-width:0}
  .rec .rtop{font-size:13.5px; font-weight:bold}
  .rec .rsub{font-size:10.5px; color:var(--sub); margin-top:1px}
  .rec .ramt{font-size:14px; font-weight:bold; flex-shrink:0}
  .rec .ramt.plus{color:#5f9a72}
  .rec .ramt.minus{color:#c47a72}
  .empty{text-align:center; color:var(--sub); font-size:13px; padding:30px 0; line-height:2}
  .sec-note{font-size:11px; color:var(--sub); line-height:1.8; margin:8px 4px 20px}

  .tabbar{
    position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto;
    display:flex; background:var(--card); box-shadow:0 -2px 10px rgba(160,130,90,.15);
    padding-bottom:env(safe-area-inset-bottom); z-index:5;
  }
  .tabbar button{flex:1; border:none; background:none; padding:11px 0 9px;
    font-size:12px; color:var(--sub); font-family:inherit}
  .tabbar button .ico{display:flex; justify-content:center; margin-bottom:3px}
  .tabbar button .ico svg{width:22px; height:22px}
  .tabbar button.active{color:var(--accent-dark); font-weight:bold}

  #overlay{display:none; position:fixed; inset:0; background:rgba(80,70,50,.35); z-index:20;
    align-items:center; justify-content:center; padding:20px}
  #overlay.show{display:flex}
  .modal{background:var(--card); border-radius:20px; padding:20px; width:100%; max-width:350px;
    box-shadow:0 10px 40px rgba(0,0,0,.2); max-height:86vh; overflow:auto}
  .modal h3{font-size:15px; margin-bottom:6px; display:flex; align-items:center; gap:6px}
  .modal h3 svg{width:20px; height:20px}
  .modal .mnote{font-size:11.5px; color:var(--sub); line-height:1.7; margin-bottom:6px}
  .modal label{font-size:12px; color:var(--sub); display:block; margin:10px 0 4px}
  .modal input, .modal select{width:100%; border:2px solid var(--line); border-radius:12px; padding:10px 12px;
    font-family:inherit; font-size:14px; background:#fffefb; color:var(--text); outline:none}
  .modal input:focus{border-color:var(--accent)}
  .split-row{display:flex; align-items:center; gap:8px; margin:8px 0}
  .split-row .s-ico{width:30px; height:30px; flex-shrink:0}
  .split-row .s-ico svg{width:100%; height:100%}
  .split-row .s-name{font-size:13px; width:86px; flex-shrink:0}
  .split-row input{flex:1; min-width:0; text-align:right}
  .split-left{text-align:center; font-size:13px; margin-top:8px; color:var(--sub)}
  .split-left b{font-size:16px; color:var(--accent-dark)}
  .split-left.over b{color:#d06a60}
  .modal .btns{display:flex; gap:8px; margin-top:14px}
  .modal .btns button{flex:1; border:none; border-radius:12px; padding:11px 0; font-family:inherit;
    font-size:13.5px; font-weight:bold}
  .m-save{background:var(--accent); color:#fff}
  .m-cancel{background:#efe7da; color:var(--sub)}
  .m-del{background:#f0e3e2; color:#c4756f}
  .jarpick{display:flex; gap:8px; margin:6px 0}
  .jarpick button{flex:1; border:2px solid var(--line); background:#fffefb; border-radius:12px;
    padding:8px 0 6px; font-family:inherit; font-size:11.5px; color:var(--sub)}
  .jarpick button svg{width:24px; height:24px; display:block; margin:0 auto 2px}
  .jarpick button.on{border-color:var(--accent); background:#eef4f6; color:var(--text); font-weight:bold}
  .iomode{display:flex; gap:8px; margin-bottom:4px}
  .iomode button{flex:1; border:2px solid var(--line); background:#fffefb; border-radius:12px;
    padding:9px 0; font-family:inherit; font-size:13px; color:var(--sub); font-weight:bold}
  .iomode button.on{border-color:var(--accent); background:#eef4f6; color:var(--text)}

  #toast{position:fixed; left:50%; bottom:92px; transform:translateX(-50%) translateY(20px);
    background:var(--text); color:#fff; font-size:14px; padding:12px 22px; border-radius:999px;
    opacity:0; pointer-events:none; transition:.3s; white-space:nowrap; z-index:30}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  .confetti{position:fixed; font-size:20px; pointer-events:none; z-index:9; animation:fall 1.1s ease-in forwards}
  @keyframes fall{0%{opacity:1; transform:translateY(0) rotate(0)}100%{opacity:0; transform:translateY(110px) rotate(200deg)}}

  .bkx{margin:18px 0 30px; background:#fff; border:1px solid rgba(0,0,0,.08); border-radius:18px;
    padding:14px 16px; box-shadow:0 4px 12px rgba(0,0,0,.06); font-size:12px; color:#8a8073; line-height:1.7}
  .bkx h3{font-size:13.5px; color:#5b4636; margin-bottom:4px; display:flex; align-items:center; gap:6px}
  .bkx h3 svg{width:18px; height:18px}
  .bkx .bkx-btn{border:none; border-radius:12px; padding:9px 16px; font-family:inherit; font-weight:700;
    font-size:12.5px; color:#fff; background:#a8b89a; margin:8px 8px 0 0; cursor:pointer}
  .bkx .bkx-btn.sub{background:#c9bfae}
</style>
</head>
<body>
<header>
  <h1><span id="hIcon"></span>お小遣い帳</h1>
  <div class="set-line"><span id="setInfo"></span> <button onclick="openSet()">✎ 設定</button></div>
</header>

<div class="kids">
  <button class="kid saku" id="kidSaku" onclick="setKid('saku')">
    <svg viewBox="0 0 72 22"><path d="M5 3 H67 Q70 3 70 6 V16 Q70 19 67 19 H5 Q2 19 2 16 V6 Q2 3 5 3 Z" fill="#4f86cf" stroke="#36659f" stroke-width="1.2"/><rect x="2.5" y="12.8" width="67" height="3.4" fill="#ffffff"/><rect x="10" y="6.4" width="12" height="5" rx="1" fill="#dbe9f5"/><rect x="30" y="6.4" width="12" height="5" rx="1" fill="#dbe9f5"/><rect x="50" y="6.4" width="12" height="5" rx="1" fill="#dbe9f5"/></svg>
    Saku
  </button>
  <button class="kid ao" id="kidAo" onclick="setKid('ao')">
    <svg viewBox="0 0 72 22"><path d="M5 3 H67 Q70 3 70 6 V16 Q70 19 67 19 H5 Q2 19 2 16 V6 Q2 3 5 3 Z" fill="#e8c840" stroke="#c4a020" stroke-width="1.2"/><rect x="2.5" y="12.8" width="67" height="3.4" fill="#2a5298"/><rect x="10" y="6.4" width="12" height="5" rx="1" fill="#f5f0c0"/><rect x="30" y="6.4" width="12" height="5" rx="1" fill="#f5f0c0"/><rect x="50" y="6.4" width="12" height="5" rx="1" fill="#f5f0c0"/></svg>
    Ao
  </button>
</div>

<div id="pageMain" class="page active">
  <div class="payday" id="paydayCard"></div>
  <div class="total-line" id="totalLine"></div>
  <div class="jars">
    <button class="jar cho" onclick="openIO('cho')"><span data-icon="jar"></span><div class="j-name">貯金</div><div class="j-amt" id="amtCho">0円</div></button>
    <button class="jar kifu" onclick="openIO('kifu')"><span data-icon="heart"></span><div class="j-name">寄付</div><div class="j-amt" id="amtKifu">0円</div></button>
    <button class="jar sugu" onclick="openIO('sugu')"><span data-icon="wallet"></span><div class="j-name">すぐ使える</div><div class="j-amt" id="amtSugu">0円</div></button>
  </div>
  <div class="jar-hint">お財布をタップすると「使った・入れた」の記録ができるよ</div>
</div>

<div id="pageHist" class="page">
  <div id="histList"></div>
  <div class="bkx">
    <h3><span data-icon="save"></span>データのバックアップ</h3>
    記録はこの端末のブラウザ内に保存されています。ときどきファイルに書き出しておくと安心です。<br>
    <button class="bkx-btn" onclick="bkExport()">書き出す</button>
    <button class="bkx-btn sub" onclick="document.getElementById('bkFile').click()">読み込む</button>
    <input type="file" id="bkFile" accept=".json,application/json" style="display:none" onchange="bkImport(this)">
  </div>
</div>

<nav class="tabbar">
  <button id="tabMain" class="active" onclick="showPage('Main')"><span class="ico" data-icon="coin"></span>お財布</button>
  <button id="tabHist" onclick="showPage('Hist')"><span class="ico" data-icon="book"></span>記録</button>
</nav>

<!-- 分けるモーダル -->
<div id="overlay">
  <div class="modal" id="mSplit" style="display:none">
    <h3><span data-icon="coin"></span>お小遣いを分けよう!</h3>
    <div class="mnote">今日のお小遣い <b id="splitAmt"></b> 円を、3つのお財布に分けてね(本人に決めさせるのがコツ!)</div>
    <div class="split-row"><span class="s-ico" data-icon="jar"></span><span class="s-name">貯金</span><input type="number" id="spCho" min="0" value="0" oninput="splitCalc()"></div>
    <div class="split-row"><span class="s-ico" data-icon="heart"></span><span class="s-name">寄付</span><input type="number" id="spKifu" min="0" value="0" oninput="splitCalc()"></div>
    <div class="split-row"><span class="s-ico" data-icon="wallet"></span><span class="s-name">すぐ使える</span><input type="number" id="spSugu" min="0" value="0" oninput="splitCalc()"></div>
    <div class="split-left" id="splitLeft"></div>
    <div class="btns">
      <button class="m-cancel" onclick="closeModal()">やめる</button>
      <button class="m-save" onclick="saveSplit()">これで分ける!</button>
    </div>
  </div>

  <!-- つかう/いれる モーダル -->
  <div class="modal" id="mIO" style="display:none">
    <h3 id="ioTitle"></h3>
    <div class="iomode">
      <button id="ioOut" onclick="setIOMode('out')">使った</button>
      <button id="ioIn" onclick="setIOMode('in')">入れた</button>
    </div>
    <label>いくら？</label>
    <input type="number" id="ioAmt" min="1" placeholder="例：100">
    <label id="ioMemoLabel">何に？（省略OK）</label>
    <input type="text" id="ioMemo" placeholder="例：おかし、ガチャガチャ">
    <div class="btns">
      <button class="m-cancel" onclick="closeModal()">やめる</button>
      <button class="m-save" onclick="saveIO()">記録する</button>
    </div>
  </div>

  <!-- 設定モーダル -->
  <div class="modal" id="mSet" style="display:none">
    <h3><span data-icon="gear"></span>設定（<span id="setKidName"></span>）</h3>
    <div class="mnote">週1回、決まった曜日に「年齢＋50円」（10歳からは＋100円）を渡すよ。誕生日から自動計算!</div>
    <label>誕生日</label>
    <input type="date" id="sBday">
    <label>お小遣いの日（曜日）</label>
    <select id="sDay">
      <option value="0">日曜日</option><option value="1">月曜日</option><option value="2">火曜日</option>
      <option value="3">水曜日</option><option value="4">木曜日</option><option value="5">金曜日</option>
      <option value="6">土曜日</option>
    </select>
    <div class="btns">
      <button class="m-cancel" onclick="closeModal()">やめる</button>
      <button class="m-save" onclick="saveSet()">保存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const KEY = "okozukai-log-v1";

/* 手描き風SVGアイコン */
const SVG_OPEN = '<svg viewBox="0 0 48 48" fill="none" stroke="#6b584a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">';
const ICONS = {
  coin:'<circle cx="24" cy="24" r="15" fill="#f6c771"/><circle cx="24" cy="24" r="9.5" stroke-width="2.2"/><path d="M20 20 L24 25 L28 20 M24 25 V30 M21 27.5 H27" stroke-width="2.2"/>',
  jar:'<path d="M15 14 H33 V17 Q37 21 37 27 V37 Q37 41 33 41 H15 Q11 41 11 37 V27 Q11 21 15 17 Z" fill="#fdf3dd"/><rect x="14" y="9" width="20" height="6" rx="2" fill="#e8b04b"/><circle cx="20" cy="30" r="3.5" fill="#f6c771" stroke-width="2"/><circle cx="28" cy="33" r="3.5" fill="#f6c771" stroke-width="2"/>',
  heart:'<path d="M24 40 Q8 30 8 19 Q8 11 15 11 Q21 11 24 17 Q27 11 33 11 Q40 11 40 19 Q40 30 24 40 Z" fill="#f0b3ad"/>',
  wallet:'<rect x="8" y="14" width="32" height="24" rx="5" fill="#b8d4bf"/><path d="M8 21 H40"/><rect x="29" y="24" width="11" height="8" rx="3" fill="#fdfaf2"/><circle cx="34" cy="28" r="1.5" fill="#6b584a" stroke="none"/>',
  book:'<path d="M24 10 Q16 6 8 8 V38 Q16 36 24 40 Q32 36 40 38 V8 Q32 6 24 10 Z" fill="#fdfaf2"/><path d="M24 10 V40"/>',
  gear:'<circle cx="24" cy="24" r="7" fill="#fdfaf2"/><path d="M24 9 V14 M24 34 V39 M9 24 H14 M34 24 H39 M13.5 13.5 L17 17 M31 31 L34.5 34.5 M34.5 13.5 L31 17 M17 31 L13.5 34.5" stroke-width="2.8"/>',
  save:'<rect x="8" y="8" width="32" height="32" rx="4" fill="#fdfaf2"/><path d="M16 8 V20 H32 V8"/><rect x="20" y="26" width="12" height="14" rx="1.5" fill="#cfe8f5"/>',
  star:'<path d="M24 6 L29 18 L42 19 L32 28 L35 41 L24 34 L13 41 L16 28 L6 19 L19 18 Z" fill="#f6c771"/>'
};
function icon(n){ return SVG_OPEN + (ICONS[n]||ICONS.star) + '</svg>'; }
document.querySelectorAll("[data-icon]").forEach(el=>{ el.innerHTML = icon(el.dataset.icon) + el.innerHTML; });
document.getElementById("hIcon").innerHTML = icon("coin");

const JARS = { cho:{name:"貯金", icon:"jar"}, kifu:{name:"寄付", icon:"heart"}, sugu:{name:"すぐ使える", icon:"wallet"} };
const WD = ["日","月","火","水","木","金","土"];

/* ---- データ ---- */
let db = load();
function load(){
  try{ const d = JSON.parse(localStorage.getItem(KEY)); if(d && d.kids) return d; }catch(e){}
  return {
    cur:"saku",
    kids:{
      saku:{ bday:"", payDay:0, given:{}, recs:[] },
      ao:{ bday:"", payDay:0, given:{}, recs:[] }
    }
  };
}
function save(){ localStorage.setItem(KEY, JSON.stringify(db)); }
function kd(){ return db.kids[db.cur]; }
function todayStr(){
  const t=new Date();
  return t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0");
}
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* 年齢と金額 */
function ageOn(bday, dstr){
  if(!bday) return null;
  const b = new Date(bday), d = new Date(dstr);
  let a = d.getFullYear() - b.getFullYear();
  const m = d.getMonth() - b.getMonth();
  if(m < 0 || (m === 0 && d.getDate() < b.getDate())) a--;
  return a;
}
function weeklyAmt(bday, dstr){
  const a = ageOn(bday, dstr);
  if(a === null || a < 0) return null;
  return a + (a >= 10 ? 100 : 50);
}
/* 直近の「お小遣いの日」(今日を含む過去) */
function lastDue(){
  const t = new Date();
  const diff = (t.getDay() - kd().payDay + 7) % 7;
  const d = new Date(t.getFullYear(), t.getMonth(), t.getDate() - diff);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
/* 残高 */
function balances(){
  const b = { cho:0, kifu:0, sugu:0 };
  Object.values(kd().given).forEach(g=>{ b.cho+=g.cho; b.kifu+=g.kifu; b.sugu+=g.sugu; });
  kd().recs.forEach(r=>{ b[r.jar] += r.amt; });
  return b;
}

/* ---- 表示 ---- */
function render(){
  document.body.classList.toggle("ao", db.cur==="ao");
  document.getElementById("kidSaku").classList.toggle("on", db.cur==="saku");
  document.getElementById("kidAo").classList.toggle("on", db.cur==="ao");

  const k = kd();
  document.getElementById("setInfo").textContent = k.bday
    ? "毎週" + WD[k.payDay] + "曜日・いま" + ageOn(k.bday, todayStr()) + "歳"
    : "まずは誕生日を設定してね →";

  // お小遣いの日カード
  const card = document.getElementById("paydayCard");
  if(!k.bday){
    card.className = "payday";
    card.innerHTML = '<div class="p-title">「✎ 設定」から誕生日とお小遣いの日を入れてね</div>';
  }else{
    const due = lastDue();
    const paid = !!k.given[due];
    const amt = weeklyAmt(k.bday, due);
    if(!paid){
      card.className = "payday due";
      const isToday = due === todayStr();
      card.innerHTML = '<div class="p-title">'+(isToday ? "今日はお小遣いの日!" : WD[k.payDay]+"曜日の分がまだだよ")+'</div>'
        + '<div class="p-amt">'+amt+'<small>円</small></div>'
        + '<div class="p-sub">年齢＋'+(ageOn(k.bday,due)>=10?100:50)+'円　いつも同じ曜日・同じ時間に渡すのがコツ!</div>'
        + '<button onclick="openSplit()">渡した!→ 3つに分ける</button>';
    }else{
      const g = k.given[due];
      const next = new Date(due); next.setDate(next.getDate()+7);
      card.className = "payday";
      card.innerHTML = '<div class="p-title">今週の分は渡したよ ✓（貯金'+g.cho+'・寄付'+g.kifu+'・すぐ'+g.sugu+'）</div>'
        + '<div class="p-sub">つぎは '+(next.getMonth()+1)+'/'+next.getDate()+'（'+WD[kd().payDay]+'）に '
        + weeklyAmt(k.bday, next.getFullYear()+"-"+String(next.getMonth()+1).padStart(2,"0")+"-"+String(next.getDate()).padStart(2,"0"))+'円</div>';
    }
  }

  const b = balances();
  document.getElementById("amtCho").textContent = b.cho + "円";
  document.getElementById("amtKifu").textContent = b.kifu + "円";
  document.getElementById("amtSugu").textContent = b.sugu + "円";
  document.getElementById("totalLine").innerHTML = "全部で <b>" + (b.cho+b.kifu+b.sugu) + "円</b> 持ってるよ";
  renderHist();
}

function renderHist(){
  const wrap = document.getElementById("histList");
  const items = [];
  Object.entries(kd().given).forEach(([d,g])=>{
    items.push({d:d, type:"given", label:"お小遣い", sub:"貯金"+g.cho+"・寄付"+g.kifu+"・すぐ"+g.sugu, amt:g.cho+g.kifu+g.sugu, icon:"coin", id:"g:"+d});
  });
  kd().recs.forEach(r=>{
    items.push({d:r.d, type:"rec", label:(r.amt<0?"使った":"入れた")+"（"+JARS[r.jar].name+"）", sub:r.memo||"", amt:r.amt, icon:JARS[r.jar].icon, id:"r:"+r.id});
  });
  if(!items.length){
    wrap.innerHTML = '<div class="empty">まだ記録がないよ<br>お小遣いを渡したらここに残っていくよ</div>';
    return;
  }
  items.sort((a,b)=> b.d.localeCompare(a.d));
  let html = "", curD = "";
  items.forEach(it=>{
    if(it.d !== curD){
      curD = it.d;
      html += '<div class="hist-day">'+(+it.d.slice(5,7))+'/'+(+it.d.slice(8,10))+'（'+WD[new Date(it.d).getDay()]+'）</div>';
    }
    const plus = it.amt >= 0;
    html += '<div class="rec" onclick="delItem(\''+it.id+'\')">'
      + '<span class="ricon">'+icon(it.icon)+'</span>'
      + '<div class="rmain"><div class="rtop">'+esc(it.label)+'</div>'
      + (it.sub ? '<div class="rsub">'+esc(it.sub)+'</div>' : '')
      + '</div><span class="ramt '+(plus?"plus":"minus")+'">'+(plus?"+":"")+it.amt+'円</span></div>';
  });
  html += '<div class="sec-note">※記録をタップすると削除できるよ。</div>';
  wrap.innerHTML = html;
}

/* ---- 操作 ---- */
function setKid(k){ db.cur=k; save(); render(); }
function showPage(p){
  ["Main","Hist"].forEach(x=>{
    document.getElementById("page"+x).classList.toggle("active", x===p);
    document.getElementById("tab"+x).classList.toggle("active", x===p);
  });
}
function showModal(id){
  document.getElementById("mSplit").style.display="none";
  document.getElementById("mIO").style.display="none";
  document.getElementById("mSet").style.display="none";
  document.getElementById(id).style.display="block";
  document.getElementById("overlay").classList.add("show");
}
function closeModal(){ document.getElementById("overlay").classList.remove("show"); }

/* 分ける */
let splitTotal = 0;
function openSplit(){
  splitTotal = weeklyAmt(kd().bday, lastDue());
  document.getElementById("splitAmt").textContent = splitTotal;
  document.getElementById("spCho").value = 0;
  document.getElementById("spKifu").value = 0;
  document.getElementById("spSugu").value = splitTotal;
  splitCalc();
  showModal("mSplit");
}
function splitCalc(){
  const c = +document.getElementById("spCho").value||0;
  const f = +document.getElementById("spKifu").value||0;
  const s = +document.getElementById("spSugu").value||0;
  const left = splitTotal - c - f - s;
  const el = document.getElementById("splitLeft");
  el.className = "split-left" + (left<0 ? " over" : "");
  el.innerHTML = left===0 ? "ぴったり!<b> OK</b>" : (left>0 ? "残り <b>"+left+"</b> 円" : "<b>"+(-left)+"</b> 円 オーバーしてるよ");
}
function saveSplit(){
  const c = +document.getElementById("spCho").value||0;
  const f = +document.getElementById("spKifu").value||0;
  const s = +document.getElementById("spSugu").value||0;
  if(c<0||f<0||s<0){ toast("マイナスは入れられないよ"); return; }
  if(c+f+s !== splitTotal){ toast("合計を"+splitTotal+"円ぴったりにしてね"); return; }
  kd().given[lastDue()] = { cho:c, kifu:f, sugu:s };
  save(); closeModal(); render(); celebrate();
}

/* つかう/いれる */
let ioJar = "sugu", ioMode = "out";
function openIO(jar){
  ioJar = jar;
  document.getElementById("ioTitle").innerHTML = '<span class="s-ico" style="width:22px;height:22px;display:inline-block;vertical-align:-4px">'+icon(JARS[jar].icon)+'</span> '+JARS[jar].name;
  document.getElementById("ioAmt").value = "";
  document.getElementById("ioMemo").value = "";
  setIOMode("out");
  showModal("mIO");
}
function setIOMode(m){
  ioMode = m;
  document.getElementById("ioOut").classList.toggle("on", m==="out");
  document.getElementById("ioIn").classList.toggle("on", m==="in");
  document.getElementById("ioMemoLabel").textContent = m==="out" ? "何に？（省略OK）" : "何のお金？（省略OK・お年玉など）";
}
function saveIO(){
  const a = parseInt(document.getElementById("ioAmt").value);
  if(isNaN(a) || a<=0){ toast("金額を入れてね"); return; }
  const amt = ioMode==="out" ? -a : a;
  if(ioMode==="out" && balances()[ioJar] + amt < 0){ toast(JARS[ioJar].name+"には"+balances()[ioJar]+"円しかないよ"); return; }
  kd().recs.push({ id: Date.now()+""+Math.floor(Math.random()*1000), d: todayStr(), jar: ioJar, amt: amt, memo: document.getElementById("ioMemo").value.trim() });
  save(); closeModal(); render(); toast("記録したよ");
}

/* 削除 */
function delItem(id){
  if(id.startsWith("g:")){
    const d = id.slice(2);
    if(confirm(d + " のお小遣いの記録を削除する？")){
      delete kd().given[d]; save(); render(); toast("削除したよ");
    }
  }else{
    const rid = id.slice(2);
    const r = kd().recs.find(x=>x.id===rid); if(!r) return;
    if(confirm("この記録（"+(r.amt<0?"使った":"入れた")+" "+Math.abs(r.amt)+"円）を削除する？")){
      kd().recs = kd().recs.filter(x=>x.id!==rid);
      save(); render(); toast("削除したよ");
    }
  }
}

/* 設定 */
function openSet(){
  document.getElementById("setKidName").textContent = db.cur==="saku" ? "Saku" : "Ao";
  document.getElementById("sBday").value = kd().bday;
  document.getElementById("sDay").value = kd().payDay;
  showModal("mSet");
}
function saveSet(){
  const b = document.getElementById("sBday").value;
  if(!b){ toast("誕生日を入れてね"); return; }
  kd().bday = b;
  kd().payDay = +document.getElementById("sDay").value;
  save(); closeModal(); render(); toast("保存したよ");
}

function celebrate(){
  for(let i=0;i<10;i++){
    const s = document.createElement("span");
    s.className = "confetti";
    s.innerHTML = '<span style="display:inline-block;width:20px;height:20px">'+icon(i%2?"coin":"star")+'</span>';
    s.style.left = (10+Math.random()*80)+"%";
    s.style.top = (20+Math.random()*30)+"%";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 1200);
  }
  toast("上手に分けられたね!");
}

/* ---- バックアップ ---- */
function bkExport(){
  const data = {};
  for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); data[k]=localStorage.getItem(k); }
  const blob = new Blob([JSON.stringify({__bkx:"okozukai", data:data})], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "お小遣い帳_バックアップ_" + todayStr() + ".json";
  a.click(); URL.revokeObjectURL(a.href);
  toast("書き出したよ");
}
function bkImport(inp){
  const f = inp.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = ()=>{
    try{
      const j = JSON.parse(rd.result);
      const data = j.__bkx ? j.data : j;
      Object.keys(data).forEach(k=>localStorage.setItem(k, data[k]));
      db = load(); render(); toast("読み込んだよ");
    }catch(e){ toast("読み込めなかった…ファイルを確認してね"); }
  };
  rd.readAsText(f);
  inp.value = "";
}

/* ---- toast ---- */
let toastTimer;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 1800);
}

render();
</script>
