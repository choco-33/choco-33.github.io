<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>宿題＆お手伝い</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#f7f2ea">
<style>
@font-face{font-family:"Uzura";src:url("../uzura.ttf") format("truetype");font-display:swap;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:"Uzura","Zen Maru Gothic",sans-serif;
    background:#f7f2ea; display:flex; flex-direction:column;
  }
  .kidbar{
    display:flex; gap:8px; padding:10px 12px 8px; max-width:480px; width:100%; margin:0 auto;
    background:#f7f2ea; flex-shrink:0;
  }
  .kidbar button{
    flex:1; border:2px solid #e3d7c8; background:#fffdf9; border-radius:16px;
    padding:9px 0; font-family:inherit; font-size:15px; font-weight:bold; color:#a09484;
    display:flex; align-items:center; justify-content:center; gap:7px;
  }
  .kidbar button svg{width:26px; height:14px}
  .kidbar button.on{color:#4a3f35; box-shadow:0 2px 8px rgba(160,130,90,.15)}
  .kidbar button.saku.on{border-color:#94b8c4; background:#eef4f6}
  .kidbar button.ao.on{border-color:#e0bd7a; background:#fdf7ea}
  .frames{flex:1; position:relative; width:100%; max-width:480px; margin:0 auto}
  .frames iframe{
    position:absolute; inset:0; width:100%; height:100%; border:none; display:none; background:#f7f2ea;
  }
  .frames iframe.on{display:block}
</style>
</head>
<body>
<div class="kidbar">
  <button class="saku" id="btnSaku">
    <svg viewBox="0 0 72 22"><path d="M5 3 H67 Q70 3 70 6 V16 Q70 19 67 19 H5 Q2 19 2 16 V6 Q2 3 5 3 Z" fill="#4f86cf" stroke="#36659f" stroke-width="1.2"/><rect x="2.5" y="12.8" width="67" height="3.4" fill="#ffffff"/><rect x="10" y="6.4" width="12" height="5" rx="1" fill="#dbe9f5"/><rect x="30" y="6.4" width="12" height="5" rx="1" fill="#dbe9f5"/><rect x="50" y="6.4" width="12" height="5" rx="1" fill="#dbe9f5"/></svg>
    Saku
  </button>
  <button class="ao" id="btnAo">
    <svg viewBox="0 0 72 22"><path d="M5 3 H67 Q70 3 70 6 V16 Q70 19 67 19 H5 Q2 19 2 16 V6 Q2 3 5 3 Z" fill="#e8c840" stroke="#c4a020" stroke-width="1.2"/><rect x="2.5" y="12.8" width="67" height="3.4" fill="#2a5298"/><rect x="10" y="6.4" width="12" height="5" rx="1" fill="#f5f0c0"/><rect x="30" y="6.4" width="12" height="5" rx="1" fill="#f5f0c0"/><rect x="50" y="6.4" width="12" height="5" rx="1" fill="#f5f0c0"/></svg>
    Ao
  </button>
</div>
<div class="frames">
  <iframe id="frSaku" src="saku.html"></iframe>
  <iframe id="frAo" src="ao.html"></iframe>
</div>
<script>
const btnS=document.getElementById("btnSaku"), btnA=document.getElementById("btnAo");
const frS=document.getElementById("frSaku"), frA=document.getElementById("frAo");
function show(kid){
  const saku = kid==="saku";
  btnS.classList.toggle("on", saku); btnA.classList.toggle("on", !saku);
  frS.classList.toggle("on", saku);  frA.classList.toggle("on", !saku);
  try{ localStorage.setItem("sakuao-last", kid); }catch(e){}
}
btnS.addEventListener("click", ()=>show("saku"));
btnA.addEventListener("click", ()=>show("ao"));
let last="saku";
try{ last = localStorage.getItem("sakuao-last")||"saku"; }catch(e){}
show(last);
</script>
</body>
</html>
